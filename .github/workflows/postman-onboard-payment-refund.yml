# .github/workflows/postman-onboard-payment-refund.yml
#
# Postman Onboarding Workflow — Payment Refund Service
# =====================================================
# CHANGE LOG vs previous version:
#   - Added workspace-id, spec-id, and all collection/environment ID inputs
#     that read from saved repository variables (vars.POSTMAN_*).
#     This prevents duplicate workspace/collection creation on re-runs.
#   - Added force_recreate logic: when triggered manually with force_recreate=true,
#     the saved IDs are intentionally omitted so resources are recreated fresh.
#   - Added variables: write permission (required to save repo variables).

name: Postman Onboarding — Payment Refund Service

on:
  push:
    branches:
      - main
    paths:
      - 'specs/payment-refund-api-openapi.yaml'
      - '.github/workflows/postman-onboard-payment-refund.yml'

  workflow_dispatch:
    inputs:
      force_recreate:
        description: 'Force recreation of workspace/collections (ignores saved IDs)'
        required: false
        default: 'false'
        type: boolean

jobs:
  onboard-payment-refund:
    name: Onboard Payment Refund API to Postman
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write
      variables: write   # Required to write/update repository variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Determine run mode ────────────────────────────────────────────────
      # On first run: vars.POSTMAN_WORKSPACE_ID is empty → action creates fresh
      # On subsequent runs: vars.POSTMAN_WORKSPACE_ID is populated → action
      #   updates existing resources in-place (no duplicates).
      # Manual runs with force_recreate=true: IDs intentionally omitted →
      #   action creates fresh regardless of saved state.
      # ─────────────────────────────────────────────────────────────────────
      - name: Onboard Payment Refund API
        uses: postman-cs/postman-api-onboarding-action@v0
        with:
          # ── Service identity ──────────────────────────────────────────────
          project-name: payment-refund-service
          domain: payments
          domain-code: PAY

          # ── Existing resource IDs (populated after first run) ─────────────
          # These read from repository variables saved by the action on the
          # previous run. When populated, the action skips creation and updates
          # existing Postman resources in-place — no new workspaces created.
          #
          # On first run: all vars.POSTMAN_* are empty → action creates fresh.
          # On re-runs: contain real UUIDs → action uses update/existing mode.
          # force_recreate=true: || '' keeps them blank → forces fresh creation.
          #
          # Variable names match exactly what the action writes to repo vars
          # (confirmed from your repository variables screenshot):
          workspace-id: ${{ inputs.force_recreate != 'true' && vars.POSTMAN_WORKSPACE_ID || '' }}
          spec-id: ${{ inputs.force_recreate != 'true' && vars.POSTMAN_SPEC_UID || '' }}
          baseline-collection-id: ${{ inputs.force_recreate != 'true' && vars.POSTMAN_BASELINE_COLLECTION_UID || '' }}
          smoke-collection-id: ${{ inputs.force_recreate != 'true' && vars.POSTMAN_SMOKE_COLLECTION_UID || '' }}
          contract-collection-id: ${{ inputs.force_recreate != 'true' && vars.POSTMAN_CONTRACT_COLLECTION_UID || '' }}

          # Pass back saved environment UIDs so existing environments are
          # updated rather than duplicated each run.
          environment-uids-json: ${{ inputs.force_recreate != 'true' && vars.POSTMAN_ENV_UIDS_JSON || '{}' }}

          # ── Ownership ─────────────────────────────────────────────────────
          requester-email: andrew.sd.tsai@gmail.com
          workspace-admin-user-ids: "53049599"

          # ── Spec location ─────────────────────────────────────────────────
          spec-url: https://raw.githubusercontent.com/tsailifehighlights/payment-refund-service/main/specs/payment-refund-api-openapi.yaml

          # ── Environments ──────────────────────────────────────────────────
          environments-json: '["prod","uat"]'

          env-runtime-urls-json: >-
            {
              "prod": "https://api.payments.example.com/v2",
              "uat":  "https://api-uat.payments.example.com/v2"
            }

          system-env-map-json: >-
            {
              "prod": "",
              "uat":  ""
            }

          governance-mapping-json: '{"payments":"Payments Platform"}'

          # ── Authentication ────────────────────────────────────────────────
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-fallback-token: ${{ secrets.GH_FALLBACK_TOKEN }}
